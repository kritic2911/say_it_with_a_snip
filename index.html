<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <div id="upload-screen">
    <div>
      <div class="title">DESTROY<br>THIS PDF</div>
      <div class="subtitle">real pages. real destruction.</div>
    </div>
    <div class="drop-zone" id="drop-zone">
      <div class="drop-icon">📄</div>
      <div class="drop-text">DROP PDF HERE · OR CLICK TO BROWSE</div>
      <input type="file" accept=".pdf" id="file-input">
    </div>
  </div>

  <div id="choice-screen">
    <div>
      <div class="title" style="font-size:clamp(2rem,5vw,3.5rem)">CHOOSE<br>YOUR FATE</div>
    </div>
    <div class="file-info">
      <span class="file-name" id="show-filename">—</span><br>
      <span id="show-pages">0</span> pages detected
    </div>
    <div class="choice-row">
      <div class="choice-btn tear-btn" id="btn-tear">
        <div class="choice-icon">✂️</div>
        <div class="choice-label">TEAR</div>
        <div class="choice-sub">ripped apart</div>
      </div>
      <div class="choice-btn burn-btn" id="btn-burn">
        <div class="choice-icon">🔥</div>
        <div class="choice-label">BURN</div>
        <div class="choice-sub">reduced to ash</div>
      </div>
    </div>
  </div>

  <div id="anim-screen">
    <div class="anim-header">
      <div class="anim-title" id="anim-title">TEARING</div>
      <div class="page-counter" id="page-counter">PAGE 0 / 0</div>
    </div>
    <div class="stage" id="stage">
      <canvas id="page-canvas"></canvas>
      <canvas id="half-left"></canvas>
      <canvas id="half-right"></canvas>
      <div id="debris-layer"></div>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="done-section">
      <div class="status-text" id="status-text">loading...</div>
      <button class="restart-btn" id="restart-btn">↩ destroy another</button>
    </div>
  </div>

</div>

<!-- Load PDF.js from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="script.js"></script>
</body>
</html>
